<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大模型系数管理 - 高保真原型 v3</title>
<style>
:root{--c:#276FF5;--cl:rgba(39,111,245,.10);--ch:rgba(39,111,245,.06);--t:rgba(0,0,0,.82);--tp:rgba(0,0,0,.94);--ts:rgba(0,0,0,.64);--tm:rgba(0,0,0,.46);--bg:#F5F6F8;--bd:rgba(0,0,0,.06);--r:8px;--rl:12px;--rx:16px;--s:0 2px 8px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
.L{display:flex;height:100vh}.S{width:200px;background:#fff;border-right:1px solid var(--bd);padding:20px 0;flex-shrink:0}.S-t{padding:0 16px 14px;font-size:15px;font-weight:700}.S a{display:block;padding:9px 16px;color:var(--ts);text-decoration:none;font-size:13px}.S a:hover{background:var(--ch)}.S a.on{background:var(--cl);color:var(--c);font-weight:600}
.M{flex:1;display:flex;flex-direction:column;overflow:hidden}
.H{padding:20px 24px 14px;display:flex;align-items:center;justify-content:space-between}.H h1{font-size:20px;font-weight:700}.H-a{display:flex;gap:8px}
.b{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;outline:none;font-family:inherit;transition:all .15s}
.bp{background:var(--c);color:#fff}.bp:hover{opacity:.9}.bs{background:#fff;color:var(--ts);border:1px solid rgba(0,0,0,.08)}.bs:hover{background:rgba(0,0,0,.02)}.bt{background:transparent;color:var(--c);padding:4px 8px}.bd{background:rgba(255,59,48,.06);color:#FF3B30;border:1px solid rgba(255,59,48,.12)}
.bsm{padding:5px 10px;font-size:12px}
.TB{padding:0 24px 12px;display:flex;align-items:center;gap:10px}.SI{width:260px;height:34px;padding:0 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none}.SI:focus{border-color:var(--c)}.TB-r{margin-left:auto;font-size:12px;color:var(--tm)}
.SP{flex:1;display:flex;padding:0 24px 20px;gap:14px;min-height:0}
.LP{width:340px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-radius:var(--rx);border:1px solid var(--bd);box-shadow:var(--s);overflow:hidden}
.LP-h{padding:12px 14px;border-bottom:1px solid var(--bd);font-size:12px;font-weight:600;color:var(--ts)}
.LP-b{flex:1;overflow-y:auto;padding:6px}
.mi{padding:10px 12px;border-radius:var(--rl);cursor:pointer;margin-bottom:3px;border:2px solid transparent;transition:all .12s}.mi:hover{background:rgba(39,111,245,.03)}.mi.on{border-color:var(--c);background:rgba(39,111,245,.04)}
.mi-n{font-size:13px;font-weight:600;color:var(--tp)}.mi-m{font-size:11px;color:var(--tm);display:flex;gap:6px;margin-top:2px}
.mi-b{padding:1px 6px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(39,111,245,.08);color:var(--c)}
.RP{flex:1;background:#fff;border-radius:var(--rx);border:1px solid var(--bd);box-shadow:var(--s);overflow-y:auto;display:flex;flex-direction:column}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;color:var(--tm)}.emp-i{font-size:40px;margin-bottom:12px;opacity:.4}.emp-t{font-size:14px;font-weight:600;color:var(--ts)}
.RP-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}.RP-t{font-size:16px;font-weight:700}
.RP-b{flex:1;padding:16px 20px;overflow-y:auto}
.sec{margin-bottom:24px}.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sec-t{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}.sec-t::before{content:'';width:3px;height:12px;background:var(--c);border-radius:2px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}.il{font-size:11px;color:var(--tm);margin-bottom:2px}.iv{font-size:13px;font-weight:600;color:var(--tp)}.mo{font-family:'SF Mono',Monaco,monospace;font-size:12px}
/* Config matrix table */
.mx{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.mx th{background:rgba(0,0,0,.02);padding:8px 10px;font-weight:600;color:var(--ts);text-align:left;border-bottom:1px solid var(--bd);font-size:11px}
.mx td{padding:7px 10px;border-bottom:1px solid var(--bd);font-family:'SF Mono',Monaco,monospace;font-size:12px}
.mx tr:last-child td{border-bottom:none}
.mx .dim{background:rgba(39,111,245,.03);font-weight:600;color:var(--c);font-family:inherit}
.mx .empty{color:var(--tm);font-style:italic;font-family:inherit}
.tg{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block;margin-right:3px}
.tg-s{background:rgba(168,85,247,.1);color:#7c3aed}.tg-t{background:rgba(245,158,11,.1);color:#b45309}
/* Modal / Wizard */
.O{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}.O.show{display:flex}
.W{background:#fff;border-radius:var(--rx);width:720px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.14)}
.W-h{padding:18px 24px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}.W-t{font-size:16px;font-weight:700}
.W-x{width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--tm);border-radius:var(--r)}.W-x:hover{background:rgba(0,0,0,.04)}
.W-b{padding:18px 24px}.W-f{padding:14px 24px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.steps{display:flex;gap:0;margin-bottom:20px}.step{flex:1;text-align:center;padding:10px;font-size:12px;font-weight:600;color:var(--tm);border-bottom:2px solid var(--bd);transition:all .15s}.step.active{color:var(--c);border-bottom-color:var(--c)}.step.done{color:var(--ts);border-bottom-color:var(--ts)}
.fg{margin-bottom:14px}.fl{display:block;font-size:12px;font-weight:600;margin-bottom:5px}.fl .rq{color:#FF3B30}
.fi{width:100%;height:34px;padding:0 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none}.fi:focus{border-color:var(--c);box-shadow:0 0 0 2px rgba(39,111,245,.08)}
.fs{width:100%;height:34px;padding:0 10px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;outline:none;background:#fff}
.fh{font-size:11px;color:var(--tm);margin-top:3px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sw{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;font-size:13px;transition:all .12s}.sw:hover{border-color:rgba(39,111,245,.3)}.sw.on{border-color:var(--c);background:rgba(39,111,245,.04)}
.sw-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0}.sw.on .sw-dot{border-color:var(--c);background:var(--c);box-shadow:inset 0 0 0 3px #fff}
/* toast */
#toast{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999}
</style>
</head>
<body>
<div class="L">
<aside class="S"><div class="S-t">KDManage</div><nav><a href="#">许可管理</a><a href="#" class="on">大模型系数管理</a><a href="#">计费公式管理</a><a href="#">运营管理</a></nav></aside>
<main class="M">
<div class="H"><h1>大模型系数管理</h1><div class="H-a"><button class="b bs" onclick="msg('导入：支持CSV/JSON批量导入')">导入</button><button class="b bs" onclick="msg('导出全部配置')">导出</button><button class="b bp" onclick="openWizard()">+ 创建系数</button></div></div>
<div class="TB"><input class="SI" placeholder="搜索模型名称 / ID" oninput="filter(this.value)"><div class="TB-r">共 <b id="cnt">0</b> 个模型</div></div>
<div class="SP">
<div class="LP"><div class="LP-h">模型列表</div><div class="LP-b" id="list"></div></div>
<div class="RP"><div class="emp" id="emp"><div class="emp-i">📋</div><div class="emp-t">选择模型查看详情</div></div><div id="det" style="display:none"></div></div>
</div>
</main>
</div>

<!-- Wizard Modal -->
<div class="O" id="wizardO"><div class="W">
<div class="W-h"><div class="W-t" id="wTitle">创建模型系数</div><button class="W-x" onclick="hideM('wizardO')">×</button></div>
<div class="W-b">
<div class="steps" id="wSteps"><div class="step active">① 选择模型</div><div class="step">② 规则维度</div><div class="step">③ 填写系数</div></div>
<div id="wContent"></div>
</div>
<div class="W-f"><div id="wLeft"></div><div id="wRight"></div></div>
</div></div>

<!-- Edit single config row -->
<div class="O" id="editO"><div class="W" style="width:600px">
<div class="W-h"><div class="W-t" id="eTitle">编辑系数</div><button class="W-x" onclick="hideM('editO')">×</button></div>
<div class="W-b" id="eBody"></div>
<div class="W-f"><div></div><div><button class="b bs" onclick="hideM('editO')">取消</button> <button class="b bp" onclick="hideM('editO');msg('已保存（新版本生成）');sel(cur.id)">保存</button></div></div>
</div></div>

<div id="toast"></div>

<script>
// === DATA ===
const D=[
{id:'glm-5.1',name:'GLM-5.1',type:'智谱',segs:[],times:[],rows:[{ti:1.0,to:3.6,ch:0.25}]},
{id:'deepseek-v4-pro',name:'DeepSeek-V4-Pro',type:'DeepSeek',segs:[],times:[{n:'谷时',r:'00:00-09:00,12:00-14:00,18:00-24:00'},{n:'峰时',r:'09:00-12:00,14:00-18:00'}],tz:'Asia/Shanghai',rows:[{time:'谷时',ti:3.0,to:6.0,ch:0.025},{time:'峰时',ti:6.0,to:12.0,ch:0.05}]},
{id:'deepseek-v4-flash',name:'DeepSeek-V4-Flash',type:'DeepSeek',segs:[],times:[{n:'谷时',r:'00:00-09:00,12:00-14:00,18:00-24:00'},{n:'峰时',r:'09:00-12:00,14:00-18:00'}],tz:'Asia/Shanghai',rows:[{time:'谷时',ti:1.0,to:2.0,ch:0.02},{time:'峰时',ti:2.0,to:4.0,ch:0.04}]},
{id:'kimi-k2.6',name:'Kimi-K2.6',type:'Moonshot',segs:[],times:[],rows:[{ti:6.5,to:27.0,ch:1.1}]},
{id:'qwen3.6-plus',name:'Qwen3.6-Plus',type:'通义',segs:[262144],times:[],rows:[{seg:262144,ti:2.0,to:12.0,ch:0.2,cw:2.5},{ti:8.0,to:48.0,ch:0.8,cw:10.0}]},
{id:'claude-opus-4.8',name:'Claude Opus 4.8',type:'Anthropic',segs:[],times:[],rows:[{ti:5.0,to:25.0,ch:0.5,cw:6.25}]},
{id:'claude-sonnet-5',name:'Claude Sonnet 5',type:'Anthropic',segs:[],times:[],rows:[{ti:3.0,to:15.0,ch:0.2,cw:2.5}]},
{id:'gemini-3.1-flash-live',name:'Gemini 3.1 Flash Live',type:'Google',segs:[],times:[],rows:[{ti:0.75,to:4.5,ii:1.0,vi:1.0,ai:3.0,ao:12.0}]},
{id:'gemini-3.1-flash-image',name:'Gemini 3.1 Flash Image',type:'Google',segs:[],times:[],rows:[{ti:0.5,to:3.0,io:60.0}]},
{id:'minimax-m3',name:'MiniMax-M3',type:'MiniMax',segs:[524288],times:[],rows:[{seg:524288,ti:2.1,to:8.4,ch:0.42},{ti:4.2,to:16.8,ch:0.84}]},
{id:'doubao-seed-2-0-pro',name:'Doubao-Seed-2.0-Pro',type:'字节',segs:[],times:[],rows:[{ti:0.47,to:2.37}]},
];

let cur=null;
function fK(n){return n>=1048576?(n/1048576)+'M':n>=1024?(n/1024)+'K':n}
function render(f=''){
  const fl=D.filter(m=>!f||m.name.toLowerCase().includes(f.toLowerCase())||m.id.includes(f));
  document.getElementById('cnt').textContent=fl.length;
  document.getElementById('list').innerHTML=fl.map(m=>`<div class="mi${cur&&cur.id===m.id?' on':''}" onclick="sel('${m.id}')"><div class="mi-n">${m.name}</div><div class="mi-m"><span>${m.type}</span><span class="mi-b">${m.rows.length}行</span>${m.segs.length?'<span class="mi-b" style="background:rgba(168,85,247,.08);color:#7c3aed">分段</span>':''}${m.times.length?'<span class="mi-b" style="background:rgba(245,158,11,.08);color:#b45309">峰谷</span>':''}</div></div>`).join('');
}
function filter(v){render(v)}

function sel(id){
  cur=D.find(m=>m.id===id);render();
  document.getElementById('emp').style.display='none';
  const d=document.getElementById('det');d.style.display='block';
  let h=`<div class="RP-h"><div class="RP-t">${cur.name}</div><div style="display:flex;gap:6px;align-items:center"><label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:4px 10px;border:1px solid var(--bd);border-radius:var(--r)"><input type="checkbox" checked onchange="msg(this.checked?'已启用':'已禁用')"> 启用</label><button class="b bsm bs" onclick="openWizardEdit()">编辑</button><button class="b bsm bd" onclick="doDel()">删除</button></div></div><div class="RP-b">`;
  // Info
  h+=`<div class="sec"><div class="sec-h"><div class="sec-t">基本信息</div></div><div class="ig"><div><div class="il">模型标识</div><div class="iv mo">${cur.id}</div></div><div><div class="il">厂商</div><div class="iv">${cur.type}</div></div><div><div class="il">配置行数</div><div class="iv">${cur.rows.length}行</div></div></div></div>`;
  // Dimensions
  h+=`<div class="sec"><div class="sec-h"><div class="sec-t">规则维度</div></div><div class="ig">`;
  h+=`<div><div class="il">上下文分段</div><div class="iv">${cur.segs.length?cur.segs.map(s=>'≤'+fK(s)).join(' / ')+' / >'+fK(cur.segs[cur.segs.length-1]):'不分段'}</div></div>`;
  h+=`<div><div class="il">峰谷时段</div><div class="iv">${cur.times.length?cur.times.map(t=>t.n+'('+t.r+')').join(' / '):'不分时段'}</div></div>`;
  if(cur.tz)h+=`<div></div>`;
  h+=`</div></div>`;
  // Config cards by row
  h+=`<div class="sec"><div class="sec-h"><div class="sec-t">系数配置</div><div></div></div>`;
  cur.rows.forEach((r,i)=>{
    let dim='默认';
    if(r.seg&&r.time)dim=`≤${fK(r.seg)} · ${r.time}`;
    else if(r.seg)dim=`≤${fK(r.seg)}`;
    else if(r.time)dim=r.time;
    else if(cur.rows.length>1&&!r.seg&&cur.segs.length>0)dim=`>${fK(cur.segs[cur.segs.length-1])}`;
    if(cur.rows.length>1&&!r.seg&&!r.time&&cur.times.length>0){/* skip odd case */}
    h+=`<div style="border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:13px;font-weight:700;color:var(--c)">${dim}</div><button class="b bsm bt" onclick="openRowEdit(${i})">编辑</button></div>`;
    // 输入系数
    h+=`<div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">输入系数</div>`;
    h+=`<table class="mx" style="margin-bottom:10px"><tr><th>文本输入</th><th>图片输入</th><th>视频输入</th><th>音频输入</th></tr><tr><td>${r.ti.toFixed(4)}</td><td>${r.ii?r.ii.toFixed(4):'<span class="empty">继承文本</span>'}</td><td>${r.vi?r.vi.toFixed(4):'<span class="empty">继承文本</span>'}</td><td>${r.ai?r.ai.toFixed(4):'<span class="empty">继承文本</span>'}</td></tr></table>`;
    // 输出系数
    h+=`<div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">输出系数</div>`;
    h+=`<table class="mx" style="margin-bottom:10px"><tr><th>文本输出</th><th>图片输出</th><th>视频输出</th><th>音频输出</th></tr><tr><td>${r.to.toFixed(4)}</td><td>${r.io?r.io.toFixed(4):'<span class="empty">继承文本</span>'}</td><td>${r.vo?r.vo.toFixed(4):'<span class="empty">继承文本</span>'}</td><td>${r.ao?r.ao.toFixed(4):'<span class="empty">继承文本</span>'}</td></tr></table>`;
    // 缓存&推理
    h+=`<div style="font-size:11px;font-weight:600;color:var(--ts);margin-bottom:6px">缓存 & 推理</div>`;
    h+=`<table class="mx"><tr><th>文本缓存命中</th><th>音频缓存命中</th><th>缓存写入</th><th>推理输出</th></tr><tr><td>${r.ch?r.ch.toFixed(4):'<span class="empty">继承文本输入</span>'}</td><td>${r.ach?r.ach.toFixed(4):'<span class="empty">继承文本缓存</span>'}</td><td>${r.cw?r.cw.toFixed(4):'<span class="empty">继承文本输入</span>'}</td><td>${r.ro?r.ro.toFixed(4):'<span class="empty">继承文本输出</span>'}</td></tr></table>`;
    if(r.timeRule)h+=`<div style="margin-top:8px;font-size:11px;color:#b45309;background:rgba(245,158,11,.06);padding:4px 8px;border-radius:4px;display:inline-block">🕐 ${r.timeRule}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  // Preview
  h+=`<div class="sec"><div class="sec-h"><div class="sec-t">计算预览</div></div><div style="background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);border-radius:var(--rl);padding:14px"><div style="font-size:12px;font-weight:600;color:#b45309;margin-bottom:10px">📐 模拟计算</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px"><div><div style="font-size:10px;color:var(--tm)">文本输入Token</div><input type="number" style="width:90px;height:28px;padding:0 6px;border:1px solid var(--bd);border-radius:4px;font-size:12px;font-family:monospace" value="50000" id="pvI" oninput="calcPv()"></div><div><div style="font-size:10px;color:var(--tm)">文本输出Token</div><input type="number" style="width:90px;height:28px;padding:0 6px;border:1px solid var(--bd);border-radius:4px;font-size:12px;font-family:monospace" value="20000" id="pvO" oninput="calcPv()"></div><div><div style="font-size:10px;color:var(--tm)">缓存命中Token</div><input type="number" style="width:90px;height:28px;padding:0 6px;border:1px solid var(--bd);border-radius:4px;font-size:12px;font-family:monospace" value="0" id="pvC" oninput="calcPv()"></div></div><div id="pvR" style="font-size:15px;font-weight:700;color:var(--c)"></div></div></div>`;
  // Version history
  h+=`<div class="sec"><div class="sec-h"><div class="sec-t">版本历史</div></div><div style="font-size:12px"><div style="padding:6px 0;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;cursor:pointer" onclick="msg('查看v1.0完整快照')"><span class="mo" style="color:var(--c);font-weight:600">v1.0.20260703</span><span style="color:var(--tm)">2026-07-03</span></div><div style="padding:6px 0;display:flex;justify-content:space-between;cursor:pointer" onclick="msg('查看v0.9完整快照')"><span class="mo" style="color:var(--c);font-weight:600">v0.9.20260615</span><span style="color:var(--tm)">2026-06-15</span></div></div></div>`;
  h+=`</div>`;
  d.innerHTML=h;
  calcPv();
}
function calcPv(){
  if(!cur)return;const r=cur.rows[0];
  const i=+(document.getElementById('pvI').value)||0;
  const o=+(document.getElementById('pvO').value)||0;
  const c=+(document.getElementById('pvC').value)||0;
  const chR=r.ch||r.ti;
  const pts=((i-c)*r.ti+c*chR+o*r.to)/1000000;
  document.getElementById('pvR').textContent=`= ${pts.toFixed(4)} 点（使用第1行配置，换算基数: 百万tokens）`;
}
function openRowEdit(i){
  const r=cur.rows[i];
  let dim='默认';if(r.seg&&r.time)dim=`≤${fK(r.seg)} · ${r.time}`;else if(r.seg)dim=`≤${fK(r.seg)}`;else if(r.time)dim=r.time;else if(cur.rows.length>1&&!r.seg&&cur.segs.length)dim=`>${fK(cur.segs[cur.segs.length-1])}`;
  document.getElementById('eTitle').textContent=`编辑 - ${cur.name} [${dim}]`;
  document.getElementById('eBody').innerHTML=`
<div class="fr"><div class="fg"><label class="fl">文本输入<span class="rq">*</span></label><input type="number" class="fi" value="${r.ti}" step="0.01"></div><div class="fg"><label class="fl">文本输出<span class="rq">*</span></label><input type="number" class="fi" value="${r.to}" step="0.01"></div></div>
<div class="fr"><div class="fg"><label class="fl">图片输入</label><input type="number" class="fi" value="${r.ii||''}" step="0.01" placeholder="空=继承文本输入"></div><div class="fg"><label class="fl">视频输入</label><input type="number" class="fi" value="${r.vi||''}" step="0.01" placeholder="空=继承文本输入"></div></div>
<div class="fr"><div class="fg"><label class="fl">音频输入</label><input type="number" class="fi" value="${r.ai||''}" step="0.01" placeholder="空=继承文本输入"></div><div class="fg"><label class="fl">图片输出</label><input type="number" class="fi" value="${r.io||''}" step="0.01" placeholder="空=继承文本输出"></div></div>
<div class="fr"><div class="fg"><label class="fl">视频输出</label><input type="number" class="fi" value="${r.vo||''}" step="0.01" placeholder="空=继承文本输出"></div><div class="fg"><label class="fl">音频输出</label><input type="number" class="fi" value="${r.ao||''}" step="0.01" placeholder="空=继承文本输出"></div></div>
<div class="fr"><div class="fg"><label class="fl">文本缓存命中</label><input type="number" class="fi" value="${r.ch||''}" step="0.01" placeholder="空=继承文本输入"></div><div class="fg"><label class="fl">音频缓存命中</label><input type="number" class="fi" value="${r.ach||''}" step="0.01" placeholder="空=继承文本缓存命中"></div></div>
<div class="fr"><div class="fg"><label class="fl">缓存写入</label><input type="number" class="fi" value="${r.cw||''}" step="0.01" placeholder="空=继承文本输入"></div><div class="fg"><label class="fl">推理输出</label><input type="number" class="fi" value="${r.ro||''}" step="0.01" placeholder="空=继承文本输出"></div></div>
<hr style="border:none;border-top:1px solid var(--bd);margin:14px 0"><div class="fg"><label class="fl">生效方式</label><select class="fs"><option>立即生效</option><option>定时生效</option></select></div>`;
  showM('editO');
}
function doDel(){if(confirm('确定删除「'+cur.name+'」？')){msg('已删除');document.getElementById('det').style.display='none';document.getElementById('emp').style.display='flex';cur=null;render();}}

// === WIZARD ===
let wStep=1,wData={};
function openWizard(){wStep=1;wData={id:'',name:'',type:'',segs:[],times:[],tz:'Asia/Shanghai'};document.getElementById('wTitle').textContent='创建模型系数';renderWizard();showM('wizardO');}
function openWizardEdit(){wStep=2;wData={...cur,segs:[...cur.segs],times:cur.times.map(t=>({...t}))};document.getElementById('wTitle').textContent='编辑规则维度 - '+cur.name;renderWizard();showM('wizardO');}

function renderWizard(){
  // Steps indicator
  document.querySelectorAll('.step').forEach((s,i)=>{s.className='step'+(i+1===wStep?' active':i+1<wStep?' done':'')});
  const c=document.getElementById('wContent');
  const l=document.getElementById('wLeft');
  const r=document.getElementById('wRight');
  if(wStep===1){
    c.innerHTML=`
<div class="fg"><label class="fl">模型名称<span class="rq">*</span></label><input class="fi" id="w1name" value="${wData.name}" placeholder="如 GLM-5.1"></div>
<div class="fg"><label class="fl">模型标识<span class="rq">*</span></label><input class="fi" id="w1id" value="${wData.id}" placeholder="如 glm-5.1（API调用时的model参数）"></div>
<div class="fg"><label class="fl">厂商</label><select class="fs" id="w1type"><option value="">选择厂商</option><option ${wData.type==='智谱'?'selected':''}>智谱</option><option ${wData.type==='DeepSeek'?'selected':''}>DeepSeek</option><option ${wData.type==='Anthropic'?'selected':''}>Anthropic</option><option ${wData.type==='Google'?'selected':''}>Google</option><option ${wData.type==='通义'?'selected':''}>通义</option><option ${wData.type==='Moonshot'?'selected':''}>Moonshot</option><option ${wData.type==='MiniMax'?'selected':''}>MiniMax</option><option ${wData.type==='字节'?'selected':''}>字节</option></select></div>`;
    l.innerHTML='';
    r.innerHTML=`<button class="b bp" onclick="wNext()">下一步 →</button>`;
  }else if(wStep===2){
    c.innerHTML=`
<div class="fg"><label class="fl">上下文分段</label>
<div style="display:flex;gap:8px;margin-bottom:8px"><div class="sw${wData.segs.length===0?' on':''}" onclick="wData.segs=[];renderWizard()"><div class="sw-dot"></div>不分段</div><div class="sw${wData.segs.length>0?' on':''}" onclick="if(!wData.segs.length)wData.segs=[262144];renderWizard()"><div class="sw-dot"></div>分段</div></div>
${wData.segs.length?`<div id="wSegs">${wData.segs.map((s,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px"><input type="number" class="fi" value="${s}" style="width:140px;height:30px" onchange="wData.segs[${i}]=+this.value"><span style="font-size:11px;color:var(--tm)">（≤${fK(s)}）</span><button class="b bsm bt" style="color:#FF3B30" onclick="wData.segs.splice(${i},1);renderWizard()">删除</button></div>`).join('')}<button class="b bsm bt" onclick="wData.segs.push(524288);renderWizard()">+ 添加阈值</button></div><div class="fh">系统自动生成 ${wData.segs.length+1} 档（${wData.segs.map(s=>'≤'+fK(s)).join('、')}、>${fK(wData.segs[wData.segs.length-1])}）</div>`:''}
</div>
<hr style="border:none;border-top:1px solid var(--bd);margin:14px 0">
<div class="fg"><label class="fl">峰谷时段</label>
<div style="display:flex;gap:8px;margin-bottom:8px"><div class="sw${wData.times.length===0?' on':''}" onclick="wData.times=[];renderWizard()"><div class="sw-dot"></div>不分时段</div><div class="sw${wData.times.length>0?' on':''}" onclick="if(!wData.times.length)wData.times=[{n:'谷时',r:'00:00-09:00,12:00-14:00,18:00-24:00'},{n:'峰时',r:'09:00-12:00,14:00-18:00'}];renderWizard()"><div class="sw-dot"></div>分时段</div></div>
${wData.times.length?`<div>${wData.times.map((t,i)=>'<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px"><input class="fi" value="'+t.n+'" style="width:80px;height:30px" placeholder="标识" onchange="wData.times['+i+'].n=this.value"><input class="fi" value="'+t.r+'" style="flex:1;height:30px" placeholder="时间段规则（如09:00-12:00,14:00-18:00）" onchange="wData.times['+i+'].r=this.value"><button class="b bsm bt" style="color:#FF3B30" onclick="wData.times.splice('+i+',1);renderWizard()">删</button></div>').join('')}<button class="b bsm bt" onclick="wData.times.push({n:'',r:''});renderWizard()">+ 添加时段</button></div><div class="fh" style="margin-top:6px">所有时段必须24小时互斥完整覆盖</div>`:''}
</div>
<div style="margin-top:14px;padding:10px 14px;background:rgba(39,111,245,.04);border-radius:var(--rl);font-size:12px;color:var(--c);font-weight:600">
预计生成 ${Math.max(1,wData.segs.length+1) * Math.max(1,wData.times.length)} 行配置（${Math.max(1,wData.segs.length+1)}档 × ${Math.max(1,wData.times.length)}时段）
</div>`;
    l.innerHTML=`<button class="b bs" onclick="wStep=1;renderWizard()">← 上一步</button>`;
    r.innerHTML=`<button class="b bp" onclick="wNext()">下一步 →</button>`;
  }else if(wStep===3){
    const segCount=Math.max(1,wData.segs.length+1);
    const timeCount=Math.max(1,wData.times.length);
    const totalRows=segCount*timeCount;
    let rows=[];
    for(let si=0;si<segCount;si++){
      for(let ti=0;ti<timeCount;ti++){
        let dim='';
        if(wData.segs.length>0)dim+=si<wData.segs.length?`≤${fK(wData.segs[si])}`:`>${fK(wData.segs[wData.segs.length-1])}`;
        if(wData.times.length>0)dim+=(dim?' · ':'')+wData.times[ti].n;
        if(!dim)dim='默认';
        rows.push(dim);
      }
    }
    c.innerHTML=`<p style="font-size:13px;color:var(--ts);margin-bottom:12px">共 ${totalRows} 行配置，请逐行填写系数（至少填文本输入和文本输出）：</p>
<div style="overflow-x:auto"><table class="mx"><tr><th>维度</th><th>文本输入*</th><th>文本输出*</th><th>缓存命中</th><th>缓存写入</th><th>音频输入</th><th>音频输出</th></tr>
${rows.map((dim,i)=>`<tr><td class="dim">${dim}</td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" id="r${i}ti"></td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" id="r${i}to"></td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" placeholder="-"></td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" placeholder="-"></td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" placeholder="-"></td><td><input type="number" class="fi" style="width:70px;height:28px" step="0.01" placeholder="-"></td></tr>`).join('')}
</table></div>
<div class="fh" style="margin-top:8px">提示：空值字段将按降级规则自动继承（如缓存命中为空→继承文本输入系数）</div>`;
    l.innerHTML=`<button class="b bs" onclick="wStep=2;renderWizard()">← 上一步</button>`;
    r.innerHTML=`<button class="b bp" onclick="doWizardSave()">完成创建</button>`;
  }
}
function wNext(){
  if(wStep===1){
    wData.name=document.getElementById('w1name').value;
    wData.id=document.getElementById('w1id').value;
    wData.type=document.getElementById('w1type').value;
    if(!wData.name||!wData.id){msg('请填写模型名称和标识');return;}
  }
  wStep++;renderWizard();
}
function doWizardSave(){hideM('wizardO');msg('创建成功！已生成配置');render();}

function showM(id){document.getElementById(id).classList.add('show')}
function hideM(id){document.getElementById(id).classList.remove('show')}
function msg(t){const e=document.getElementById('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2500)}
render();
sel(D[0].id);
</script>
</body>
</html>
